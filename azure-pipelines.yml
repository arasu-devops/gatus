trigger:
- Azure-main

pool:
  vmImage: ubuntu-latest

variables:
- group: CICD-Demo-var-group  # Link the variable group

steps:
# 1️⃣ Checkout Code from GitHub
- checkout: self
  displayName: "Checkout GitHub repository"

# 2️⃣ Login to Docker Hub
- script: |
    echo "Logging in to Docker Hub..."
    echo $(DOCKER_PASSWORD) | docker login -u arasu35 --password-stdin
    docker info  # Verify login success
  displayName: "Login to Docker Hub"

# 3️⃣ Build Docker Image
- script: |
    echo "Building the Docker image..."
    docker build -t arasu35/gatus:latest -f ./Dockerfile .
    docker images
  displayName: "Build Docker Image"

# 4️⃣ Push Image to Docker Hub
- script: |
    echo "Tagging and pushing to Docker Hub..."
    docker tag arasu35/gatus:latest arasu35/gatus:latest
    docker push arasu35/gatus:latest
  displayName: "Push Docker Image to Docker Hub"
